# ============================================================
# OpenWiki Infrastructure
# ============================================================
# PostgreSQL with pgvector extension for vector search
# MinIO for S3-compatible raw file storage
# ============================================================

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: openwiki-db
    environment:
      POSTGRES_DB: openwiki
      POSTGRES_USER: openwiki
      POSTGRES_PASSWORD: openwiki_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwiki"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: openwiki-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  pgdata:
  miniodata: